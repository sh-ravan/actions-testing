name: MANUAL - main to production

on:
  workflow_dispatch:
    inputs:
      core:
        type: boolean
        description: Merge main into core-production
        default: true
      m_core:
        type: boolean
        description: Merge main into m-core-production
        default: true
      taskmapper:
        type: boolean
        description: Merge main into taskmapper-production
        default: true
      m_taskmapper:
        type: boolean
        description: Merge main into m-taskmapper-production
        default: true

jobs:
  automerge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: merge main to core-production
        if: ${{ github.event.inputs.core == 'true' }}
        uses: tukasz/direct-merge-action@b7882b0c66df6376596a91f117272c1ba2d5f867
        with:
          source-branch: main
          target-branch: core-production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: merge main to m-core-production
        if: ${{ github.event.inputs.m_core == 'true' }}
        uses: tukasz/direct-merge-action@b7882b0c66df6376596a91f117272c1ba2d5f867
        with:
          source-branch: main
          target-branch: m-core-production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: merge main to taskmapper-production
        if: ${{ github.event.inputs.taskmapper == 'true' }}
        uses: tukasz/direct-merge-action@b7882b0c66df6376596a91f117272c1ba2d5f867
        with:
          source-branch: main
          target-branch: taskmapper-production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: merge main to m-taskmapper-production
        if: ${{ github.event.inputs.m_taskmapper == 'true' }}
        uses: tukasz/direct-merge-action@b7882b0c66df6376596a91f117272c1ba2d5f867
        with:
          source-branch: main
          target-branch: m-taskmapper-production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}