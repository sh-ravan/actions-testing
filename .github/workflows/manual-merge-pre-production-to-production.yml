name: MANUAL - pre-production to production

on:
  workflow_dispatch:
    inputs:
      core:
        type: boolean
        description: pre-production --> core-production
        default: true
      m_core:
        type: boolean
        description: pre-production --> m-core-production
        default: true
      taskmapper:
        type: boolean
        description: pre-production --> taskmapper-production
        default: true
      m_taskmapper:
        type: boolean
        description: pre-production --> m-taskmapper-production
        default: true

jobs:
  automerge:
    runs-on: ubuntu-latest

    steps:
      - run: echo "⚡ This merge job was manually triggered by ${{ github.actor }}."
      - run: echo "🐧 Running job on a ${{ runner.os }} server hosted by GitHub"
      - run: echo "🔎 The name of your branch is ${{ github.ref }} and your repository is ${{ github.repository }}."

      - name: Check out repository code
        uses: actions/checkout@v3

      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."
      - run: echo "🚀 The workflow is now ready to start."

      - name: merge pre-production to core-production
        if: ${{ github.event.inputs.core == 'true' }}
        uses: tukasz/direct-merge-action@b7882b0c66df6376596a91f117272c1ba2d5f867
        with:
          source-branch: pre-production
          target-branch: core-production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: merge pre-production to m-core-production
        if: ${{ github.event.inputs.m_core == 'true' }}
        uses: tukasz/direct-merge-action@b7882b0c66df6376596a91f117272c1ba2d5f867
        with:
          source-branch: pre-production
          target-branch: m-core-production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: merge pre-production to taskmapper-production
        if: ${{ github.event.inputs.taskmapper == 'true' }}
        uses: tukasz/direct-merge-action@b7882b0c66df6376596a91f117272c1ba2d5f867
        with:
          source-branch: pre-production
          target-branch: taskmapper-production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: merge pre-production to m-taskmapper-production
        if: ${{ github.event.inputs.m_taskmapper == 'true' }}
        uses: tukasz/direct-merge-action@b7882b0c66df6376596a91f117272c1ba2d5f867
        with:
          source-branch: pre-production
          target-branch: m-taskmapper-production
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: echo "🍏 This job's status is ${{ job.status }}."
