name: main to m-taskmapper-dev
description: This action is to be run MANUALLY. It merges the main branch into the m-taskmapper-dev branch

on:
  workflow_dispatch:

jobs:
  automerge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: merge main to m-taskmapper-dev
        uses: tukasz/direct-merge-action@b7882b0c66df6376596a91f117272c1ba2d5f867
        with:
          source-branch: main
          target-branch: m-taskmapper-dev
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}