name: automerge main to development
# description: This action is run AUTOMATICALLY as soon as PRs/pushes are made to main. But it can be run MANUALLY also. It merges the latest commit on main branch into the respective live dev branch if the commit message contains core/ m-core/ tm/ or m-tm/

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

  workflow_dispatch:

jobs:
  automerge:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: main to core-dev
        if: "startsWith(github.event.head_commit.message, 'core/')"
        uses: tukasz/direct-merge-action@b7882b0c66df6376596a91f117272c1ba2d5f867
        with:
          source-branch: main
          target-branch: core-dev
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: main to m-core-dev
        if: "startsWith(github.event.head_commit.message, 'm-core/')"
        uses: tukasz/direct-merge-action@b7882b0c66df6376596a91f117272c1ba2d5f867
        with:
          source-branch: main
          target-branch: m-core-dev
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: main to taskmpaper-dev
        if: "startsWith(github.event.head_commit.message, 'tm/')"
        uses: tukasz/direct-merge-action@b7882b0c66df6376596a91f117272c1ba2d5f867
        with:
          source-branch: main
          target-branch: taskmpaper-dev
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: main to m-taskmapper-dev
        if: "startsWith(github.event.head_commit.message, 'm-tm/')"
        uses: tukasz/direct-merge-action@b7882b0c66df6376596a91f117272c1ba2d5f867
        with:
          source-branch: main
          target-branch: m-taskmapper-dev
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
